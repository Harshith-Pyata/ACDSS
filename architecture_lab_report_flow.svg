<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 1130" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowDash" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1180" height="1130" fill="#ffffff"/>

  <!-- Title -->
  <text x="590" y="44" text-anchor="middle" font-size="27" font-weight="700" fill="#0f172a">ACDSS — Lab Report Information Flow</text>
  <text x="590" y="72" text-anchor="middle" font-size="14" fill="#64748b">From image upload and OCR extraction through the dual-agent RAG pipeline to the patient-facing summary</text>

  <!-- ================= SPINE (left) ================= -->

  <!-- S1 Frontend -->
  <rect x="120" y="100" width="470" height="64" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.6"/>
  <text x="355" y="128" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">1 · Frontend (React)</text>
  <text x="355" y="150" text-anchor="middle" font-size="13" fill="#475569">User attaches a lab-report image, then presses Send</text>

  <line x1="355" y1="164" x2="355" y2="206" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="365" y="188" font-size="12" fill="#64748b">POST /diagnose (image)</text>

  <!-- S2 OCR -->
  <rect x="120" y="208" width="470" height="78" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.6"/>
  <text x="355" y="234" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">2 · OCR Extraction</text>
  <text x="355" y="255" text-anchor="middle" font-size="13" fill="#475569">Tesseract (pytesseract) — preprocess + image_to_string</text>
  <text x="355" y="275" text-anchor="middle" font-size="12.5" fill="#b45309">output: raw lab-report text</text>

  <line x1="355" y1="286" x2="355" y2="320" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="365" y="307" font-size="12" fill="#64748b">raw_text</text>

  <!-- S3 Diagnosis Agent -->
  <rect x="120" y="322" width="470" height="196" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="355" y="348" text-anchor="middle" font-size="16" font-weight="700" fill="#065f46">3 · Diagnosis Agent — LangGraph (4 nodes)</text>
  <text x="355" y="376" text-anchor="middle" font-size="12.5" fill="#047857">extract_labs → retrieve_context → analyze_labs → evaluate_diagnosis</text>
  <text x="355" y="398" text-anchor="middle" font-size="12" fill="#475569">LLM: Groq llama-3.1-8b-instant (temp 0)</text>
  <line x1="150" y1="412" x2="560" y2="412" stroke="#a7f3d0" stroke-width="1"/>
  <text x="355" y="432" text-anchor="middle" font-size="12.5" font-weight="600" fill="#065f46">Outputs</text>
  <text x="355" y="452" text-anchor="middle" font-size="12" fill="#475569">primary hypothesis · lab values vs reference ranges</text>
  <text x="355" y="470" text-anchor="middle" font-size="12" fill="#475569">confidence score · key abnormalities</text>
  <text x="355" y="488" text-anchor="middle" font-size="12" fill="#475569">recommended specialization · simple explanation</text>

  <line x1="355" y1="518" x2="355" y2="548" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="365" y="537" font-size="12" fill="#64748b">diagnosis result</text>

  <!-- S4 Diagnosis card -->
  <rect x="150" y="550" width="410" height="44" rx="9" fill="#f0fdf4" stroke="#86efac" stroke-width="1.3"/>
  <text x="355" y="577" text-anchor="middle" font-size="13" fill="#166534">▸ Diagnosis summary card shown in chat</text>

  <line x1="355" y1="594" x2="355" y2="628" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="365" y="616" font-size="11.5" fill="#64748b">user requests treatment · POST /treatment</text>

  <!-- S5 Treatment Agent -->
  <rect x="120" y="630" width="470" height="196" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="355" y="656" text-anchor="middle" font-size="16" font-weight="700" fill="#5b21b6">4 · Treatment Agent — LangGraph (4 nodes)</text>
  <text x="355" y="682" text-anchor="middle" font-size="12.5" fill="#6d28d9">constraint_check → clinical_context →</text>
  <text x="355" y="700" text-anchor="middle" font-size="12.5" fill="#6d28d9">treatment_generation → evaluate_treatment</text>
  <text x="355" y="722" text-anchor="middle" font-size="12" fill="#475569">LLM: Groq llama-3.1-8b-instant</text>
  <line x1="150" y1="734" x2="560" y2="734" stroke="#ddd6fe" stroke-width="1"/>
  <text x="355" y="754" text-anchor="middle" font-size="12.5" font-weight="600" fill="#5b21b6">Outputs</text>
  <text x="355" y="774" text-anchor="middle" font-size="12" fill="#475569">disease explanation · treatment plan (steps + rationale)</text>
  <text x="355" y="792" text-anchor="middle" font-size="12" fill="#475569">severity level · prognosis · follow-up question</text>

  <line x1="355" y1="826" x2="355" y2="856" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="365" y="845" font-size="12" fill="#64748b">treatment plan</text>

  <!-- S6 Meta-Evaluator -->
  <rect x="120" y="858" width="470" height="82" rx="10" fill="#fff1f2" stroke="#f43f5e" stroke-width="2"/>
  <text x="355" y="884" text-anchor="middle" font-size="16" font-weight="700" fill="#9f1239">5 · Meta-Evaluator</text>
  <text x="355" y="905" text-anchor="middle" font-size="12.5" fill="#475569">Cross-validates diagnosis + treatment (llama-3.1-8b)</text>
  <text x="355" y="925" text-anchor="middle" font-size="12" fill="#be123c">→ quality score · safety verdict · safety flags · clinical summary</text>

  <line x1="355" y1="940" x2="355" y2="972" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="365" y="960" font-size="12" fill="#64748b">validated plan</text>

  <!-- S7 Treatment card -->
  <rect x="150" y="974" width="410" height="52" rx="9" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.3"/>
  <text x="355" y="996" text-anchor="middle" font-size="13" fill="#6b21a8">▸ Treatment summary card</text>
  <text x="355" y="1015" text-anchor="middle" font-size="12" fill="#7c3aed">'What we found' (problem)  +  'How it's treated' (cure)</text>

  <!-- ================= RIGHT COLUMN ================= -->

  <!-- Conversational Agent -->
  <rect x="660" y="100" width="420" height="232" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="870" y="126" text-anchor="middle" font-size="15" font-weight="700" fill="#3730a3">Conversational Agent (orchestrator)</text>
  <text x="870" y="147" text-anchor="middle" font-size="12.5" fill="#475569">run_acdss_agent · Groq llama-3.3-70b-versatile</text>
  <text x="870" y="165" text-anchor="middle" font-size="12.5" fill="#475569">manual bind_tools loop (no langchain.agents)</text>
  <line x1="690" y1="178" x2="1050" y2="178" stroke="#c7d2fe" stroke-width="1"/>
  <text x="870" y="198" text-anchor="middle" font-size="12.5" font-weight="600" fill="#3730a3">Tools exposed to the LLM</text>
  <text x="678" y="220" font-size="11.5" fill="#4338ca">• analyze_lab_report  →  Diagnosis Agent</text>
  <text x="678" y="238" font-size="11.5" fill="#4338ca">• build_treatment_plan  →  Treatment Agent</text>
  <text x="678" y="256" font-size="11.5" fill="#4338ca">• get_patient_labs  ·  recommend_specialist</text>
  <text x="678" y="274" font-size="11.5" fill="#4338ca">• suggest_doctors  ·  get_doctor_availability</text>
  <text x="678" y="292" font-size="11.5" fill="#4338ca">• book_appointment  →  SQLite</text>
  <text x="870" y="318" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">guardrails: asks before suggesting · never books on invented data</text>

  <!-- agent -> diagnosis agent (tool) -->
  <path d="M660,235 C610,250 600,330 591,360" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrowDash)"/>
  <!-- agent -> treatment agent (tool) -->
  <path d="M660,250 C600,420 600,560 591,648" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrowDash)"/>

  <!-- KB Diagnosis -->
  <rect x="660" y="372" width="420" height="116" rx="10" fill="#f8fafc" stroke="#64748b" stroke-width="1.6"/>
  <text x="870" y="397" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">Knowledge Base — Diagnosis (RAG)</text>
  <text x="870" y="418" text-anchor="middle" font-size="12" fill="#475569">Chroma vector DB · collection 'Diagnosis_guidelines'</text>
  <text x="870" y="437" text-anchor="middle" font-size="12" fill="#475569">source: clinical_guide_laboratory_tests.pdf</text>
  <text x="870" y="456" text-anchor="middle" font-size="12" fill="#475569">Google gemini embeddings · retriever k = 3</text>
  <text x="870" y="476" text-anchor="middle" font-size="11.5" font-style="italic" fill="#64748b">queried by the retrieve_context node</text>

  <!-- KB diagnosis -> S3 -->
  <line x1="660" y1="430" x2="592" y2="430" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrowDash)"/>
  <text x="600" y="423" font-size="11" fill="#64748b">RAG k=3</text>

  <!-- KB Treatment -->
  <rect x="660" y="630" width="420" height="116" rx="10" fill="#f8fafc" stroke="#64748b" stroke-width="1.6"/>
  <text x="870" y="655" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">Knowledge Base — Treatment (RAG)</text>
  <text x="870" y="676" text-anchor="middle" font-size="12" fill="#475569">Chroma vector DB · collection 'Treatment_guidelines'</text>
  <text x="870" y="695" text-anchor="middle" font-size="12" fill="#475569">source: treatment_guidelines.pdf</text>
  <text x="870" y="714" text-anchor="middle" font-size="12" fill="#475569">Google gemini embeddings · retriever k = 2</text>
  <text x="870" y="734" text-anchor="middle" font-size="11.5" font-style="italic" fill="#64748b">queried by the clinical_context node</text>

  <!-- KB treatment -> S5 -->
  <line x1="660" y1="690" x2="592" y2="690" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrowDash)"/>
  <text x="600" y="683" font-size="11" fill="#64748b">RAG k=2</text>

  <!-- SQLite -->
  <rect x="660" y="858" width="420" height="86" rx="10" fill="#f1f5f9" stroke="#475569" stroke-width="1.6"/>
  <text x="870" y="884" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">SQLite — acdss.db</text>
  <text x="870" y="906" text-anchor="middle" font-size="12.5" fill="#475569">Doctors  ·  Patients  ·  Appointments</text>
  <text x="870" y="926" text-anchor="middle" font-size="11.5" font-style="italic" fill="#64748b">written by book_appointment() and /appointments</text>

  <!-- agent -> SQLite (far right rail) -->
  <path d="M1080,300 L1110,300 L1110,890 L1082,890" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrowDash)"/>

  <!-- ================= LEGEND ================= -->
  <line x1="150" y1="1062" x2="190" y2="1062" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="198" y="1066" font-size="12" fill="#475569">data / information flow</text>
  <line x1="370" y1="1062" x2="410" y2="1062" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrowDash)"/>
  <text x="418" y="1066" font-size="12" fill="#475569">RAG retrieval / agent tool call</text>
  <text x="660" y="1066" font-size="11.5" font-style="italic" fill="#94a3b8">LangGraph dual-agent + meta-evaluator · FastAPI · React</text>
</svg>
